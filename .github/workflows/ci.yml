name: CI

on:
    push:
        branches: [main]
    pull_request:

jobs:
    build:
        name: Build & vet
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod
                  cache-dependency-path: go.sum

            - run: go mod tidy
            - run: go build ./...
            - run: go vet ./...
            - run: go test ./...
